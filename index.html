<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropShield - 進階病蟲害用藥系統</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        
        /* 篩選與搜尋區塊 */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            background: #eef2f3;
            padding: 15px;
            border-radius: 6px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select, input {
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th { background-color: #27ae60; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* 店內用藥亮色標籤 */
        .store-medicine {
            background-color: #e8f8f5;
            color: #117a65;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid #a3e4d7;
            display: inline-block;
            margin-top: 5px;
        }

        /* 危害照片點擊樣式 */
        .pest-img {
            max-width: 100px;
            height: auto;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .pest-img:hover { transform: scale(1.05); }

        /* Lightbox 彈出視窗樣式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px; right: 30px;
            color: white; font-size: 40px; font-weight: bold;
            cursor: pointer;
        }

        .no-data { text-align: center; color: #7f8c8d; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 CropShield 植物保護資訊與店內資材系統</h1>
    
    <div class="control-panel">
        <div class="control-group">
            <label id="cropLabel">選擇作物：</label>
            <select id="cropSelect" onchange="fetchCropData()">
                <option value="">-- 請選擇 --</option>
                <option value="tomato">番茄</option>
                <option value="mango">芒果</option>
            </select>
        </div>
        <div class="control-group">
            <label for="searchInput">搜尋關鍵字：</label>
            <input type="text" id="searchInput" placeholder="輸入病名、蟲名或症狀..." oninput="filterTable()">
        </div>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th style="width: 15%;">常見病蟲害</th>
                <th style="width: 25%;">危害症狀</th>
                <th style="width: 25%;">政府登記推薦藥劑 (API)</th>
                <th style="width: 20%;">💡 本店常備/建議用藥</th>
                <th style="width: 15%;">危害照片 (點擊放大)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="placeholderText" class="no-data">請先選擇上方作物以查看用藥建議。</div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="" alt="放大圖">
</div>

<script>
    // 模擬從政府 API (過濾後) 撈回來的結構，並包含我們店內自訂的商品對應
    const mockApiResponse = {
        tomato: [
            {
                name: "番茄晚疫病",
                symptom: "葉片出現水浸狀斑點，後擴大變褐，潮濕時背面有白黴。",
                officialMedicine: "亞托敏 (Azoxystrobin)、氟派瑞 (Fluopyram)",
                storeProduct: "【店長推薦】穩疫能 500ml (含亞托敏成分)", // 功能 1：店裡用藥
                imgUrl: "https://placehold.co/400x300/e74c3c/ffffff?text=Tomato+Blight"
            },
            {
                name: "銀葉粉虱",
                symptom: "吸食汁液，分泌蜜露引發煤煙病，並傳播病毒病。",
                officialMedicine: "益達胺 (Imidacloprid)、達特南 (Dinotefuran)",
                storeProduct: "【殺蟲特效】蝨蟲淨粒劑 1kg",
                imgUrl: "https://placehold.co/400x300/f39c12/ffffff?text=Whitefly"
            }
        ],
        mango: [
            {
                name: "芒果炭疽病",
                symptom: "危害新梢、葉片、花穗及果實，產生圓形或不規則形黑褐色凹陷病斑。",
                officialMedicine: "腐絕 (Thiabendazole)、克熱淨 (Iminctadine)",
                storeProduct: "【常備特效藥】炭疽剋星 W.P.",
                imgUrl: "https://placehold.co/400x300/3498db/ffffff?text=Mango+Anthracnose"
            },
            {
                name: "芒果畸形病",
                symptom: "花穗與嫩葉叢生畸形，俗稱「瘋花」或「公花」。",
                officialMedicine: "撲克拉 (Prochloraz)",
                storeProduct: "【進口高效】撲克拉乳劑 25%",
                imgUrl: "https://placehold.co/400x300/9b59b6/ffffff?text=Mango+Malformation"
            }
        ]
    };

    // 功能 1：模擬 Fetch API 資料並動態渲染
    function fetchCropData() {
        const selectedCrop = document.getElementById("cropSelect").value;
        const table = document.getElementById("resultTable");
        const tbody = document.getElementById("tableBody");
        const placeholder = document.getElementById("placeholderText");
        
        tbody.innerHTML = ""; // 清空舊資料
        document.getElementById("searchInput").value = ""; // 切換作物時重設搜尋框

        if (selectedCrop && mockApiResponse[selectedCrop]) {
            const data = mockApiResponse[selectedCrop];

            data.forEach(item => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td class="searchable-name"><strong>${item.name}</strong></td>
                    <td class="searchable-symptom">${item.symptom}</td>
                    <td>${item.officialMedicine}</td>
                    <td><span class="store-medicine">${item.storeProduct}</span></td>
                    <td><img src="${item.imgUrl}" alt="${item.name}" class="pest-img" onclick="openLightbox('${item.imgUrl}')"></td>
                `;
                tbody.appendChild(row);
            });

            table.style.display = "table";
            placeholder.style.display = "none";
        } else {
            table.style.display = "none";
            placeholder.style.display = "block";
        }
    }

    // 功能 3：即時關鍵字過濾
    function filterTable() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#tableBody tr");

        rows.forEach(row => {
            const name = row.querySelector(".searchable-name").textContent.toLowerCase();
            const symptom = row.querySelector(".searchable-symptom").textContent.toLowerCase();
            
            // 如果名稱或症狀包含關鍵字，就顯示，否則隱藏
            if (name.includes(query) || symptom.includes(query)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    }

    // 功能 2：Lightbox 控制
    function openLightbox(imgUrl) {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");
        lightboxImg.src = imgUrl;
        lightbox.style.display = "flex";
    }

    function closeLightbox() {
        document.getElementById("lightbox").style.style.display = "none";
    }
</script>

</body>
</html>
